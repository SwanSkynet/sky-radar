name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    # Backs internal/pgstore's and internal/pgstorewriter's integration
    # tests; they skip themselves if Postgres isn't reachable (see
    # internal/pgstore/testdb_test.go), but this service container makes
    # them actually run in CI instead of perpetually skipping.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - run: go vet ./cmd/... ./internal/...
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.12
          args: ./cmd/... ./internal/...
      - run: go test ./cmd/... ./internal/...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run build

  # Builds every Phase 1 production image on every PR (no push) so a
  # broken Dockerfile/build-arg surfaces before merge, per
  # docs/tech-stack/hosting-and-deployment.md's intended CI/CD pipeline.
  container-build:
    needs: backend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - adapter-opensky
          - adapter-adsblol
          - adapter-airplaneslive
          - normalizer
          - eventengine
          - pgstorewriter
          - apigateway
          - web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Determine Dockerfile and build args
        id: docker_meta
        run: |
          if [ "${{ matrix.service }}" = "web" ]; then
            echo "file=deploy/web.Dockerfile" >> $GITHUB_OUTPUT
            echo "args=VITE_API_BASE_URL=/api" >> $GITHUB_OUTPUT
          else
            echo "file=deploy/go.Dockerfile" >> $GITHUB_OUTPUT
            echo "args=SERVICE=${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ${{ steps.docker_meta.outputs.file }}
          build-args: ${{ steps.docker_meta.outputs.args }}
          push: false

  container-push:
    needs: [backend, frontend, container-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - adapter-opensky
          - adapter-adsblol
          - adapter-airplaneslive
          - normalizer
          - eventengine
          - pgstorewriter
          - apigateway
          - web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Determine Dockerfile and build args
        id: docker_meta
        run: |
          if [ "${{ matrix.service }}" = "web" ]; then
            echo "file=deploy/web.Dockerfile" >> $GITHUB_OUTPUT
            echo "args=VITE_API_BASE_URL=/api" >> $GITHUB_OUTPUT
          else
            echo "file=deploy/go.Dockerfile" >> $GITHUB_OUTPUT
            echo "args=SERVICE=${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ${{ steps.docker_meta.outputs.file }}
          build-args: ${{ steps.docker_meta.outputs.args }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sky-radar-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/sky-radar-${{ matrix.service }}:${{ github.sha }}

  deploy-production:
    needs: container-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      
      - name: Copy docker-compose and Caddyfile to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DIGITALOCEAN_HOST }}
          username: ${{ secrets.DIGITALOCEAN_USERNAME }}
          key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
          source: "deploy/docker-compose.prod.yml,deploy/Caddyfile"
          target: "/root/sky-radar"
          strip_components: 0

      - name: Deploy on Droplet via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DIGITALOCEAN_HOST }}
          username: ${{ secrets.DIGITALOCEAN_USERNAME }}
          key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
          script: |
            mkdir -p /root/sky-radar/deploy
            cd /root/sky-radar/deploy
            
            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Set variables (lowercasing repo owner for GHCR registry name matching)
            export GHCR_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            export TAG="${{ github.sha }}"
            
            # Pull new images and restart the stack
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
