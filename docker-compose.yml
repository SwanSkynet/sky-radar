services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 2s
      timeout: 2s
      retries: 15

  nats:
    image: nats:2-alpine
    command: ["-js", "-m", "8222"]
    restart: unless-stopped
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 2s
      retries: 15

  adapter-opensky:
    build:
      context: .
      dockerfile: deploy/go.Dockerfile
      args:
        SERVICE: adapter-opensky
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy

  adapter-adsblol:
    build:
      context: .
      dockerfile: deploy/go.Dockerfile
      args:
        SERVICE: adapter-adsblol
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy

  adapter-airplaneslive:
    build:
      context: .
      dockerfile: deploy/go.Dockerfile
      args:
        SERVICE: adapter-airplaneslive
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy

  normalizer:
    build:
      context: .
      dockerfile: deploy/go.Dockerfile
      args:
        SERVICE: normalizer
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      - PORT=8084
      - REDIS_ADDR=redis:6379
      - NATS_URL=nats://nats:4222
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  eventengine:
    build:
      context: .
      dockerfile: deploy/go.Dockerfile
      args:
        SERVICE: eventengine
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      - PORT=8085
      - NATS_URL=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy

  pgstorewriter:
    build:
      context: .
      dockerfile: deploy/go.Dockerfile
      args:
        SERVICE: pgstorewriter
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - PORT=8086
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy

  apigateway:
    build:
      context: .
      dockerfile: deploy/go.Dockerfile
      args:
        SERVICE: apigateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy

  web:
    image: node:22-alpine
    working_dir: /app
    # No restart policy: this dev-only service re-runs `npm install` on
    # every boot (no built image), so auto-restarting it would make
    # recovery from a crash depend on npm registry availability instead
    # of just relaunching a built artifact.
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules

volumes:
  web_node_modules:
