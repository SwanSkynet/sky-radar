services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # NATS JetStream and Postgres are intentionally absent: per
  # docs/implementation-plan.md, both are introduced in Phase 2 once the
  # normalizer has a second consumer / durable-write requirement.

  adapter-opensky:
    build:
      context: .
      dockerfile: deploy/go.Dockerfile
      args:
        SERVICE: adapter-opensky
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis

  adapter-adsblol:
    build:
      context: .
      dockerfile: deploy/go.Dockerfile
      args:
        SERVICE: adapter-adsblol
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis

  adapter-airplaneslive:
    build:
      context: .
      dockerfile: deploy/go.Dockerfile
      args:
        SERVICE: adapter-airplaneslive
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis

  normalizer:
    build:
      context: .
      dockerfile: deploy/go.Dockerfile
      args:
        SERVICE: normalizer
    ports:
      - "8084:8084"
    environment:
      - PORT=8084
    depends_on:
      - redis

  eventengine:
    build:
      context: .
      dockerfile: deploy/go.Dockerfile
      args:
        SERVICE: eventengine
    ports:
      - "8085:8085"
    environment:
      - PORT=8085

  apigateway:
    build:
      context: .
      dockerfile: deploy/go.Dockerfile
      args:
        SERVICE: apigateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    depends_on:
      - redis

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules

volumes:
  web_node_modules:
