services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_started
      apigateway:
        condition: service_started

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      timeout: 2s
      retries: 5

  nats:
    image: nats:2-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    restart: unless-stopped
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 2s
      retries: 5

  adapter-opensky:
    image: ghcr.io/${GHCR_OWNER:-swanskynet}/sky-radar-adapter-opensky:${TAG:-latest}
    restart: unless-stopped
    environment:
      - PORT=8081
      - REDIS_ADDR=redis:6379
      - OPENSKY_CLIENT_ID=${OPENSKY_CLIENT_ID}
      - OPENSKY_CLIENT_SECRET=${OPENSKY_CLIENT_SECRET}
      # Run fully global (/states/all, no OPENSKY_LAMIN/LOMIN/LAMAX/LOMAX bbox)
      # so any viewport — including the whole world — returns worldwide aircraft.
      #
      # A global /states/all call costs 4 OpenSky credits and the free
      # authenticated tier is ~4000 credits/day, i.e. a sustainable rate of one
      # call per ~86s. Polling faster (we previously used 15s) exhausts the daily
      # budget within hours and OpenSky then returns HTTP 429 for the rest of the
      # window — which is exactly why global coverage was empty. 120s stays well
      # within budget (~2880 credits/day); client-side interpolation keeps motion
      # smooth between the slower global refreshes. Do NOT lower this without
      # accounting for the 4-credit global cost.
      - POLL_INTERVAL_SECONDS=120
      - DEPLOY_ENV=production
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      redis:
        condition: service_healthy

  adapter-adsblol:
    image: ghcr.io/${GHCR_OWNER:-swanskynet}/sky-radar-adapter-adsblol:${TAG:-latest}
    restart: unless-stopped
    environment:
      - PORT=8082
      - REDIS_ADDR=redis:6379
      # Pinned to Southern California (LAX/SAN/LAS + Edwards/China Lake/Nellis/
      # Naval bases within 250 NM) so the per-type/military SVGs are exercised.
      # Providers cap radius at 250 NM; this is a shared server-side poller, not
      # camera-following. Override via env to repin.
      - ADSBLOL_LAT=34.05
      - ADSBLOL_LON=-118.24
      - ADSBLOL_RADIUS_NM=250
      - POLL_INTERVAL_SECONDS=10
      - DEPLOY_ENV=production
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      redis:
        condition: service_healthy

  adapter-airplaneslive:
    image: ghcr.io/${GHCR_OWNER:-swanskynet}/sky-radar-adapter-airplaneslive:${TAG:-latest}
    restart: unless-stopped
    environment:
      - PORT=8083
      - REDIS_ADDR=redis:6379
      # Pinned to Southern California — see adapter-adsblol above. Both regional
      # adapters share the same pin so their 250 NM coverage overlaps.
      - AIRPLANES_LIVE_LAT=34.05
      - AIRPLANES_LIVE_LON=-118.24
      - AIRPLANES_LIVE_RADIUS_NM=250
      - POLL_INTERVAL_SECONDS=10
      - DEPLOY_ENV=production
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      redis:
        condition: service_healthy

  normalizer:
    image: ghcr.io/${GHCR_OWNER:-swanskynet}/sky-radar-normalizer:${TAG:-latest}
    restart: unless-stopped
    environment:
      - PORT=8084
      - REDIS_ADDR=redis:6379
      - NATS_URL=nats://nats:4222
      # Merge as often as the tightened adapter cadence delivers (10s) so the
      # normalizer doesn't become the freshness bottleneck. Stay within the
      # master-PRD freshness SLO (P95 ≤ 15s).
      - MERGE_INTERVAL_SECONDS=10
      - DEPLOY_ENV=production
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  eventengine:
    image: ghcr.io/${GHCR_OWNER:-swanskynet}/sky-radar-eventengine:${TAG:-latest}
    restart: unless-stopped
    environment:
      - PORT=8085
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=${POSTGRES_SSLMODE:-disable}
      - DEPLOY_ENV=production
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy

  pgstorewriter:
    image: ghcr.io/${GHCR_OWNER:-swanskynet}/sky-radar-pgstorewriter:${TAG:-latest}
    restart: unless-stopped
    environment:
      - PORT=8086
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=${POSTGRES_SSLMODE:-disable}
      - DEPLOY_ENV=production
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy

  apigateway:
    image: ghcr.io/${GHCR_OWNER:-swanskynet}/sky-radar-apigateway:${TAG:-latest}
    restart: unless-stopped
    environment:
      - PORT=8080
      - REDIS_ADDR=redis:6379
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=${POSTGRES_SSLMODE:-disable}
      - DEPLOY_ENV=production
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy

  web:
    image: ghcr.io/${GHCR_OWNER:-swanskynet}/sky-radar-web:${TAG:-latest}
    restart: unless-stopped

  # Opt-in (`docker compose -f docker-compose.prod.yml --profile
  # cloud-shipping up -d`) Grafana Cloud shipping agent — see
  # deploy/observability/alloy/config.alloy and
  # docs/tech-stack/observability-and-ops.md. Requires
  # GRAFANA_CLOUD_PROMETHEUS_URL, GRAFANA_CLOUD_PROMETHEUS_USER,
  # GRAFANA_CLOUD_TEMPO_URL, GRAFANA_CLOUD_TEMPO_USER, and
  # GRAFANA_CLOUD_API_KEY in the deploy .env. Without this profile enabled,
  # OTEL_EXPORTER_OTLP_ENDPOINT stays unset above and every service simply
  # runs trace-free (metrics still flow via each service's own /metrics
  # endpoint regardless), so enabling this profile later is a config-only
  # change, not a redeploy of the app images.
  alloy:
    image: grafana/alloy:v1.5.1
    profiles: ["cloud-shipping"]
    restart: unless-stopped
    environment:
      - GRAFANA_CLOUD_PROMETHEUS_URL=${GRAFANA_CLOUD_PROMETHEUS_URL}
      - GRAFANA_CLOUD_PROMETHEUS_USER=${GRAFANA_CLOUD_PROMETHEUS_USER}
      - GRAFANA_CLOUD_TEMPO_URL=${GRAFANA_CLOUD_TEMPO_URL}
      - GRAFANA_CLOUD_TEMPO_USER=${GRAFANA_CLOUD_TEMPO_USER}
      - GRAFANA_CLOUD_API_KEY=${GRAFANA_CLOUD_API_KEY}
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
    command: ["run", "--server.http.listen-addr=0.0.0.0:12345", "/etc/alloy/config.alloy"]

volumes:
  redis_data:
  postgres_data:
  caddy_data:
  caddy_config:
  nats_data:
