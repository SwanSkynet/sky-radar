# Fly.io app config for cmd/adapter-airplaneslive. Internal-only worker,
# polls airplanes.live and writes raw state to Redis; no public
# http_service. Deploy from the repo root:
#   fly deploy --config deploy/fly/adapter-airplaneslive.toml .
app = "sky-radar-adapter-airplaneslive"
primary_region = "sjc"

[build]
  dockerfile = "deploy/go.Dockerfile"

  [build.args]
    SERVICE = "adapter-airplaneslive"

[env]
  PORT = "8083"
  REDIS_ADDR = "sky-radar-redis.internal:6379"

[checks]
  [checks.healthz]
    port = 8083
    type = "http"
    path = "/healthz"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
