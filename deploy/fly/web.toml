# Fly.io app config for the static frontend (see deploy/web.Dockerfile).
# Deploy from the repo root: fly deploy --config deploy/fly/web.toml .
#
# VITE_API_BASE_URL is baked in at build time (Vite inlines import.meta.env
# at build, not at runtime) — update it if the apigateway app name/URL
# changes, then redeploy.
app = "sky-radar-web"
primary_region = "sjc"

[build]
  dockerfile = "deploy/web.Dockerfile"

  [build.args]
    VITE_API_BASE_URL = "https://sky-radar-apigateway.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
    protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
