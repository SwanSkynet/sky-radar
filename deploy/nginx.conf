# Static SPA serving for the frontend (see deploy/web.Dockerfile). Listens
# on 8080 to match deploy/fly/web.toml's internal_port; /healthz exists so
# Fly's http_service check has the same endpoint shape as the Go services.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    location = /healthz {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri /index.html;
    }
}
